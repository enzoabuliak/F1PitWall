<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF1A1A"/>
      <stop offset="100%" stop-color="#DC0000"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- red glow halo -->
  <rect x="116" y="116" width="280" height="280" rx="56" fill="#DC0000" opacity="0.35" filter="url(#glow)"/>
  <!-- red chip -->
  <rect x="116" y="116" width="280" height="280" rx="56" fill="url(#red)"/>
  <!-- inner sheen -->
  <rect x="116" y="116" width="280" height="140" rx="56" fill="white" opacity="0.08"/>
  <!-- F1 wordmark -->
  <g fill="white" font-family="-apple-system, system-ui, sans-serif" font-weight="900" text-anchor="middle">
    <text x="256" y="305" font-size="170" letter-spacing="-10">F1</text>
  </g>
  <!-- LED bar — phosphor green -->
  <g>
    <rect x="146" y="420" width="32" height="10" rx="2" fill="#00ff9c"/>
    <rect x="190" y="420" width="32" height="10" rx="2" fill="#00ff9c"/>
    <rect x="234" y="420" width="32" height="10" rx="2" fill="#00ff9c"/>
    <rect x="278" y="420" width="32" height="10" rx="2" fill="#00ff9c" opacity="0.45"/>
    <rect x="322" y="420" width="32" height="10" rx="2" fill="#00ff9c" opacity="0.2"/>
  </g>
</svg>
